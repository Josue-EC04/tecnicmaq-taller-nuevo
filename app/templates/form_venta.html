{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-success">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">💰 Confirmar Venta</h4>
            </div>
            <div class="card-body">
                <div class="text-center mb-3">
                    <h5 class="fw-bold">{{ repuesto.nombre }}</h5>
                    <p class="text-muted">{{ repuesto.marca }} - {{ repuesto.codigo }}</p>
                    <h2 class="text-success fw-bold">S/{{ repuesto.precio }}</h2>
                </div>
                
                <hr>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Cantidad a Vender</label>
                        <input type="number" name="cantidad" class="form-control form-control-lg text-center fw-bold" 
                               value="1" min="1" max="{{ repuesto.cantidad }}" required>
                        <div class="form-text text-center mt-2">
                            Stock disponible: <span class="badge bg-secondary">{{ repuesto.cantidad }}</span>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg">✅ Registrar Venta</button>
                        <a href="/inventario" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
