{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-warning">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">Reservar Repuesto</h4>
            </div>
            <div class="card-body">
                <h5 class="card-title">{{ repuesto.nombre }} ({{ repuesto.codigo }})</h5>
                <p class="text-muted">Stock disponible: {{ repuesto.cantidad }}</p>
                <hr>
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Cliente / Mecánico</label>
                        <input type="text" name="cliente" class="form-control" placeholder="Ej: Juan Pérez" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teléfono (Opcional)</label>
                        <input type="text" name="telefono" class="form-control" placeholder="Ej: 099...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Cantidad a Apartar</label>
                        <input type="number" name="cantidad" class="form-control" value="1" min="1" max="{{ repuesto.cantidad }}" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning">Confirmar Reserva</button>
                        <a href="/inventario" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
