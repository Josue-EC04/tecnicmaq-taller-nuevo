<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecnicmaq ECK - Sistema</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='img/logo.png') }}" 
                    alt="Tecnicmaq ECK" 
                    height="50"> 
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-bold align-items-center"> 
                    {% if current_user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link" href="{{ url_for('main.inventario') }}">Inventario</a></li>
                        <li class="nav-item"><a class="nav-link" href="{{ url_for('main.lista_reservas') }}">Reservas</a></li>
                        <li class="nav-item"><a class="nav-link" href="{{ url_for('main.historial_ventas') }}">Reportes</a></li>
                        
                        <li class="nav-item dropdown ms-2">
                            <a class="nav-link dropdown-toggle text-warning" href="#" role="button" data-bs-toggle="dropdown">
                                <i class="bi bi-shield-lock-fill"></i> Seguridad
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                <li>
                                    <a class="dropdown-item" href="{{ url_for('main.descargar_backup') }}">
                                        <i class="bi bi-download text-primary"></i> Descargar Backup
                                    </a>
                                </li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <a class="dropdown-item" href="{{ url_for('main.subir_backup') }}">
                                        <i class="bi bi-upload text-danger"></i> Restaurar Datos
                                    </a>
                                </li>
                            </ul>
                        </li>

                        <li class="nav-item d-flex align-items-center ms-3 border-start ps-3">
                            <span class="text-secondary me-2 small">Hola, {{ current_user.nombre }}</span>
                            <a class="btn btn-outline-danger btn-sm" href="{{ url_for('main.logout') }}">
                                <i class="bi bi-box-arrow-right"></i> Salir
                            </a>
                        </li>

                    {% else %}
                        <li class="nav-item"><a class="nav-link" href="{{ url_for('main.login') }}">Ingresar</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
