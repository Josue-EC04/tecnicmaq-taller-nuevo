<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecnicmaq ECK - Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='img/logo.png') }}" 
                    alt="Tecnicmaq ECK" 
                    height="50"> </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-bold"> {% if current_user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link" href="/inventario">Inventario</a></li>
                        <li class="nav-item"><a class="nav-link" href="/reservas">Reservas</a></li>
                        <li class="nav-item"><a class="nav-link" href="/historial-ventas">Reportes</a></li>
                        <li class="nav-item d-flex align-items-center ms-3">
                            <span class="text-secondary me-2">Hola, {{ current_user.nombre }}</span>
                            <a class="btn btn-outline-danger btn-sm" href="/logout">Salir</a>
                        </li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link" href="/login">Ingresar</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
