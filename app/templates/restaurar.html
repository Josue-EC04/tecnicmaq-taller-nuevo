{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0 fw-bold">📥 Restaurar Copia de Seguridad</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted">
                        Sube aquí el archivo <code>.json</code> que descargaste anteriormente. 
                        Esto recuperará tus productos, ventas y usuarios.
                    </p>
                    
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Seleccionar Archivo JSON</label>
                            <input type="file" name="archivo" class="form-control" accept=".json" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                🔄 Restaurar Sistema
                            </button>
                            <a href="/" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
