{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-8 col-lg-6">
        
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            
            <div class="card-header text-white p-4" style="background: linear-gradient(135deg, #198754, #20c997);">
                <div class="d-flex align-items-center gap-3">
                    <div class="bg-white bg-opacity-25 rounded-circle p-2">
                        <i class="bi bi-plus-lg fs-4 text-white"></i>
                    </div>
                    <div>
                        <h4 class="mb-0 fw-bold">Registrar Nuevo Repuesto</h4>
                        <p class="mb-0 opacity-75 small">Ingresa los detalles para el inventario.</p>
                    </div>
                </div>
            </div>

            <div class="card-body p-4 bg-white">
                <form method="POST" enctype="multipart/form-data">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small">CÓDIGO ÚNICO</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-upc-scan"></i></span>
                                <input type="text" name="codigo" class="form-control bg-light border-start-0" placeholder="Ej: FIL-002" required autofocus>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small">IMAGEN</label>
                            <input type="file" name="imagen" class="form-control text-muted" accept="image/*">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary small">NOMBRE DEL PRODUCTO</label>
                        <input type="text" name="nombre" class="form-control form-control-lg fw-bold" placeholder="Ej: Pastillas de Freno" required>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small">MARCA</label>
                            <input type="text" name="marca" class="form-control" placeholder="Ej: Toyota">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small">STOCK INICIAL</label>
                            <input type="number" name="cantidad" class="form-control fw-bold text-center" value="1" min="0" required>
                        </div>
                    </div>

                    <div class="p-3 bg-light rounded-3 mb-4 border border-dashed">
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label text-muted small">Costo Compra (S/)</label>
                                <div class="input-group input-group-sm">
                                    <span class="input-group-text">S/</span>
                                    <input type="number" step="0.01" name="costo" class="form-control" placeholder="0.00">
                                </div>
                            </div>
                            <div class="col-6">
                                <label class="form-label text-success fw-bold small">Precio Venta (S/)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-success text-white border-success">S/</span>
                                    <input type="number" step="0.01" name="precio" class="form-control border-success fw-bold text-success fs-5" placeholder="0.00" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg shadow fw-bold">
                            <i class="bi bi-save me-2"></i> Guardar Repuesto
                        </button>
                        <a href="{{ url_for('main.inventario') }}" class="btn btn-light text-muted">Cancelar</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
