{% extends "base.html" %}
{% block title %}Agregar Repuesto – ECK Panel{% endblock %}
{% block breadcrumb %}Inventario / Agregar Repuesto{% endblock %}

{% block content %}
<div style="max-width:620px;">

  <div class="eck-page-header">
    <div>
      <h2 class="eck-heading">Registrar Repuesto</h2>
      <p class="eck-subheading">Agrega un nuevo ítem al inventario del taller</p>
    </div>
    <a href="{{ url_for('main.inventario') }}" class="btn-eck btn-eck-ghost btn-eck-sm">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
  </div>

  <div class="eck-card">
    <form method="POST" enctype="multipart/form-data" style="padding:24px;">

      <!-- Código + Imagen -->
      <div class="row g-3 mb-4">
        <div class="col-md-5">
          <label class="eck-label">Código Único</label>
          <input type="text" name="codigo" class="eck-input mono"
                 placeholder="Ej: FIL-002" required autofocus
                 style="font-size:15px; font-weight:600; letter-spacing:.5px;">
        </div>
        <div class="col-md-7">
          <label class="eck-label">Imagen del Repuesto (Opcional)</label>
          <input type="file" name="imagen" class="eck-input" accept="image/*"
                 style="padding:7px 12px;">
        </div>
      </div>

      <!-- Nombre -->
      <div class="mb-4">
        <label class="eck-label">Nombre del Repuesto</label>
        <input type="text" name="nombre" class="eck-input"
               style="font-size:15px; font-weight:600;"
               placeholder="Ej: Pastillas de Freno Delantero" required>
      </div>

      <!-- Marca + Stock -->
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="eck-label">Marca</label>
          <input type="text" name="marca" class="eck-input" placeholder="Ej: Toyota, Bosch...">
        </div>
        <div class="col-md-6">
          <label class="eck-label">Stock Inicial</label>
          <input type="number" name="cantidad" class="eck-input mono"
                 style="font-size:16px; font-weight:700; text-align:center;"
                 value="1" min="0" required>
        </div>
      </div>

      <!-- Precios -->
      <div style="background:var(--bg-subtle); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px; margin-bottom:24px;">
        <div style="font-size:11px; font-weight:700; color:var(--text-4); text-transform:uppercase; letter-spacing:1px; margin-bottom:14px;">
          Precios
        </div>
        <div class="row g-3">
          <div class="col-6">
            <label class="eck-label">Costo de Compra (S/)</label>
            <input type="number" step="0.01" name="costo" class="eck-input mono"
                   placeholder="0.00">
          </div>
          <div class="col-6">
            <label class="eck-label" style="color:var(--red);">Precio de Venta (S/)</label>
            <input type="number" step="0.01" name="precio" class="eck-input mono"
                   style="border-color:#FECDD3; font-weight:700; font-size:15px; background:#FFF9F9;"
                   placeholder="0.00" required>
          </div>
        </div>
      </div>

      <!-- Acciones -->
      <div style="display:flex; gap:10px;">
        <button type="submit" class="btn-eck btn-eck-primary" style="flex:1; justify-content:center;">
          <i class="bi bi-save"></i> Guardar Repuesto
        </button>
        <a href="{{ url_for('main.inventario') }}" class="btn-eck btn-eck-ghost">
          Cancelar
        </a>
      </div>

    </form>
  </div>

</div>
{% endblock %}
