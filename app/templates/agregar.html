{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Registrar Nuevo Repuesto</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="/agregar" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Código (Único)</label>
                        <input type="text" name="codigo" class="form-control" placeholder="Ej: FIL-002" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Imagen del Repuesto</label>
                        <input type="file" name="imagen" class="form-control" accept="image/*">
                        <div class="form-text">Formatos permitidos: JPG, PNG.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre del Repuesto</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Ej: Pastillas de Freno" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Marca</label>
                        <input type="text" name="marca" class="form-control" placeholder="Ej: Toyota">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Cantidad Inicial</label>
                            <input type="number" name="cantidad" class="form-control" value="1" min="0" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Precio ($)</label>
                            <input type="number" step="0.01" name="precio" class="form-control" placeholder="0.00" required>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Guardar Repuesto</button>
                        <a href="/inventario" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
