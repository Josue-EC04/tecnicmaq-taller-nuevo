{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-primary">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Editar Repuesto: {{ repuesto.nombre }}</h4>
            </div>
            <div class="card-body">
                <form action="{{ url_for('main.editar', id=repuesto.id, q=q, orden=orden, page=page) }}" method="POST" enctype="multipart/form-data">
                    
                    <div class="mb-3">
                        <label class="form-label">Código</label>
                        <input type="text" name="codigo" class="form-control" value="{{ repuesto.codigo }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Imagen (Dejar en blanco para mantener la actual)</label>
                        <div class="d-flex align-items-center gap-3">
                            <img src="{{ url_for('static', filename='uploads/' + repuesto.imagen_filename) }}" width="50" class="rounded border">
                            <input type="file" name="imagen" class="form-control" accept="image/*">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" value="{{ repuesto.nombre }}" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Marca</label>
                            <input type="text" name="marca" class="form-control" value="{{ repuesto.marca }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Stock Actual</label>
                            <input type="number" name="cantidad" class="form-control" value="{{ repuesto.cantidad }}" min="0" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-secondary">Costo Compra (S/)</label>
                            <input type="number" step="0.01" name="costo" class="form-control" value="{{ repuesto.costo }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-success">Precio Venta (S/)</label>
                            <input type="number" step="0.01" name="precio" class="form-control" value="{{ repuesto.precio }}" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                        
                        <a href="{{ url_for('main.inventario', q=q, orden=orden, page=page) }}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
